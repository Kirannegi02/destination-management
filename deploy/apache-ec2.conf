# Apache vhost for DMS on EC2
# Install: sudo cp deploy/apache-ec2.conf /etc/httpd/conf.d/dms.conf
#          sudo apachectl configtest && sudo systemctl restart httpd

<VirtualHost *:80>
    ServerName 51.20.115.26
    DocumentRoot /home/ec2-user/dms/public

    <Directory /home/ec2-user/dms/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /var/log/httpd/dms-error.log
    CustomLog /var/log/httpd/dms-access.log combined
</VirtualHost>

# If you must keep DocumentRoot as public_html instead:
# DocumentRoot /home/ec2-user/public_html
# (ensure public_html is Laravel's public/ and parent folder has app/, vendor/, .env)
