# Deploy Laravel + React to Hostinger on push to main.
# One-time server setup: deploy/DEPLOY_HOSTINGER.md

name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Hostinger shared hosting often uses 65002; override via HOSTINGER_SSH_PORT secret.
      SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT || '65002' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, curl, zip, gd, intl, bcmath, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: transport-frontend/package-lock.json

      - name: Build React frontend
        working-directory: transport-frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Merge frontend into Laravel public/
        run: |
          cp -r transport-frontend/dist/* public/
          test -f public/index.php

      - name: Deploy files via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzr
            --delete
            --exclude=.git
            --exclude=.github
            --exclude=.env
            --exclude=.env.*
            --exclude=node_modules
            --exclude=transport-frontend/node_modules
            --exclude=tests
            --exclude=storage/app/public
            --exclude=storage/logs
            --exclude=storage/framework/cache/data
            --exclude=storage/framework/sessions
            --exclude=storage/framework/views
            --exclude=bootstrap/cache/*.php
          path: ./
          remote_path: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          remote_host: ${{ secrets.HOSTINGER_SSH_HOST }}
          remote_port: ${{ env.SSH_PORT }}
          remote_user: ${{ secrets.HOSTINGER_SSH_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Post-deploy (migrations, caches)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.HOSTINGER_DEPLOY_PATH }}"
            php artisan migrate --force --no-interaction
            php artisan storage:link --force 2>/dev/null || true
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache 2>/dev/null || true
